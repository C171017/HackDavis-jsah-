<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PantryPal — AI Food Pantry Coordinator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
            --amber-50: #fffbeb;
            --amber-100: #fef3c7;
            --amber-400: #fbbf24;
            --amber-500: #f59e0b;
            --amber-600: #d97706;
            --red-100: #fee2e2;
            --red-400: #f87171;
            --red-500: #ef4444;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --cream: #fefdf8;
            --warm-white: #faf9f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--warm-white);
            color: var(--slate-800);
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Fraunces', serif; }

        .app-container {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, var(--green-700), var(--green-800));
            padding: 24px 20px 28px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .header-logo {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo span { font-size: 32px; }
        .header-sub {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 300;
        }

        /* ─── Steps indicator ─── */
        .steps-bar {
            display: flex;
            padding: 16px 20px;
            gap: 6px;
            background: white;
            border-bottom: 1px solid var(--slate-100);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .step-dot {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--slate-200);
            transition: background 0.3s;
        }
        .step-dot.active { background: var(--green-500); }
        .step-dot.done { background: var(--green-700); }

        /* ─── Content area ─── */
        .content {
            padding: 24px 20px 100px;
        }
        .step-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--slate-900);
        }
        .step-desc {
            font-size: 14px;
            color: var(--slate-500);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* ─── Camera / Upload ─── */
        .upload-zone {
            border: 2px dashed var(--slate-300);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .upload-zone:hover {
            border-color: var(--green-400);
            background: var(--green-50);
        }
        .upload-zone.has-image {
            border: none;
            padding: 0;
            overflow: hidden;
        }
        .upload-zone img {
            width: 100%;
            border-radius: 16px;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--slate-700);
        }
        .upload-hint {
            font-size: 13px;
            color: var(--slate-400);
            margin-top: 6px;
        }
        .camera-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
        }
        .cam-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1.5px solid var(--slate-200);
            background: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cam-btn:hover {
            border-color: var(--green-400);
            background: var(--green-50);
        }

        /* ─── Ingredients list ─── */
        .ingredient-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .ingredient-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: white;
            border: 1.5px solid var(--slate-200);
            border-radius: 100px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .ingredient-chip .remove {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: none;
            background: var(--slate-100);
            color: var(--slate-500);
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .ingredient-chip .remove:hover {
            background: var(--red-100);
            color: var(--red-500);
        }
        .add-ingredient-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .add-input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid var(--slate-200);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-input:focus { border-color: var(--green-400); }
        .add-input::placeholder { color: var(--slate-400); }
        .add-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: var(--green-600);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover { background: var(--green-700); }

        /* ─── Quick-add pantry staples ─── */
        .staples-section {
            margin-top: 12px;
            margin-bottom: 20px;
        }
        .staples-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--slate-400);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .staple-btn {
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid var(--slate-200);
            background: var(--slate-50);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 4px 6px 0;
            font-family: 'DM Sans', sans-serif;
            color: var(--slate-600);
        }
        .staple-btn:hover { background: var(--green-50); border-color: var(--green-300); }
        .staple-btn.added { background: var(--green-100); border-color: var(--green-400); color: var(--green-700); }

        /* ─── Meal cards ─── */
        .meal-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1.5px solid var(--slate-100);
            cursor: pointer;
            transition: all 0.2s;
        }
        .meal-card:hover { border-color: var(--green-300); box-shadow: 0 2px 12px rgba(22,101,52,0.08); }
        .meal-card.selected { border-color: var(--green-500); background: var(--green-50); }
        .meal-name {
            font-family: 'Fraunces', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .meal-desc { font-size: 13px; color: var(--slate-500); margin-bottom: 10px; line-height: 1.4; }
        .meal-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--slate-400);
            margin-bottom: 10px;
        }
        .meal-ingredients-row { display: flex; gap: 16px; }
        .meal-ing-col { flex: 1; }
        .meal-ing-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--slate-400);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .meal-ing-item { font-size: 13px; color: var(--slate-600); line-height: 1.6; }
        .meal-ing-item.missing { color: var(--red-500); }
        .meal-ing-item.have { color: var(--green-600); }

        /* ─── Specific request ─── */
        .specific-request {
            margin-top: 16px;
            padding: 16px;
            background: var(--amber-50);
            border-radius: 12px;
            border: 1px solid var(--amber-100);
        }
        .specific-request label {
            font-size: 13px;
            font-weight: 500;
            color: var(--amber-600);
            display: block;
            margin-bottom: 6px;
        }

        /* ─── Location input ─── */
        .location-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* ─── Pantry list ─── */
        .pantry-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1.5px solid var(--slate-100);
            transition: all 0.2s;
        }
        .pantry-card.selected { border-color: var(--green-500); background: var(--green-50); }
        .pantry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .pantry-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .pantry-address { font-size: 13px; color: var(--slate-400); }
        .pantry-phone { font-size: 13px; color: var(--green-600); margin-top: 4px; }
        .pantry-check {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--slate-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .pantry-check.checked {
            background: var(--green-500);
            border-color: var(--green-500);
            color: white;
            font-size: 12px;
        }

        /* ─── Call status ─── */
        .call-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1.5px solid var(--slate-100);
        }
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .call-pantry-name { font-weight: 700; font-size: 15px; }
        .call-status-badge {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-ringing { background: var(--amber-100); color: var(--amber-600); }
        .badge-connected { background: var(--green-100); color: var(--green-700); }
        .badge-completed { background: var(--green-600); color: white; }
        .badge-failed { background: var(--red-100); color: var(--red-500); }
        .call-message {
            font-size: 13px;
            color: var(--slate-500);
            font-style: italic;
        }
        .call-results { margin-top: 10px; }
        .call-result-item {
            font-size: 13px;
            padding: 3px 0;
        }
        .result-available { color: var(--green-600); }
        .result-unavailable { color: var(--slate-400); text-decoration: line-through; }

        /* ─── Results / Plan ─── */
        .plan-card {
            background: linear-gradient(135deg, var(--green-700), var(--green-800));
            border-radius: 16px;
            padding: 24px;
            color: white;
            margin-bottom: 16px;
        }
        .plan-title {
            font-family: 'Fraunces', serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .plan-stop {
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .plan-stop-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .plan-stop-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }
        .plan-stop-name { font-weight: 700; }
        .plan-stop-items { font-size: 13px; opacity: 0.9; margin-left: 32px; }

        /* ─── Primary Button ─── */
        .primary-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--green-600);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .primary-btn:hover { background: var(--green-700); transform: translateY(-1px); }
        .primary-btn:active { transform: translateY(0); }
        .primary-btn:disabled {
            background: var(--slate-300);
            cursor: not-allowed;
            transform: none;
        }
        .primary-btn.calling {
            background: var(--amber-500);
            animation: pulse-bg 2s ease-in-out infinite;
        }
        @keyframes pulse-bg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        .secondary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1.5px solid var(--slate-200);
            background: white;
            color: var(--slate-700);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .secondary-btn:hover { border-color: var(--green-300); background: var(--green-50); }

        /* ─── Spinner ─── */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        .spinner.dark {
            border-color: rgba(0,0,0,0.1);
            border-top-color: var(--green-600);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in { animation: slideIn 0.3s ease-out; }

        /* ─── Live pulse ─── */
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-400);
            display: inline-block;
            margin-right: 6px;
            animation: livePulse 1.5s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74,222,128,0); }
        }

        /* ─── Demo banner ─── */
        .demo-banner {
            background: var(--amber-50);
            border: 1px solid var(--amber-100);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: var(--amber-600);
            margin-bottom: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API = window.location.origin;
        const STAPLES = ['flour', 'sugar', 'salt', 'pepper', 'butter', 'olive oil', 'garlic', 'onion', 'rice', 'pasta', 'baking soda', 'vanilla extract', 'soy sauce', 'vinegar'];
        const TOTAL_STEPS = 6;

        function App() {
            const [step, setStep] = useState(0);
            const [sessionId, setSessionId] = useState('');
            const [image, setImage] = useState(null);
            const [imagePreview, setImagePreview] = useState('');
            const [ingredients, setIngredients] = useState([]);
            const [newIngredient, setNewIngredient] = useState('');
            const [addedStaples, setAddedStaples] = useState(new Set());
            const [meals, setMeals] = useState([]);
            const [selectedMeal, setSelectedMeal] = useState(null);
            const [specificRequest, setSpecificRequest] = useState('');
            const [location, setLocation] = useState('');
            const [pantries, setPantries] = useState([]);
            const [selectedPantries, setSelectedPantries] = useState(new Set());
            const [callStatuses, setCallStatuses] = useState({});
            const [plan, setPlan] = useState(null);
            const [loading, setLoading] = useState(false);
            const [demoMode, setDemoMode] = useState(true);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);
            const wsRef = useRef(null);

            // WebSocket connection
            useEffect(() => {
                if (!sessionId) return;
                const ws = new WebSocket(`${API.replace('http', 'ws')}/ws/${sessionId}`);
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    setCallStatuses(prev => {
                        const updated = { ...prev };
                        const key = data.pantry || data.call_id;
                        if (!updated[key]) updated[key] = {};
                        updated[key] = { ...updated[key], ...data };
                        return updated;
                    });
                };
                wsRef.current = ws;
                return () => ws.close();
            }, [sessionId]);

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setImage(file);
                    setImagePreview(URL.createObjectURL(file));
                }
            };

            const analyzeFridge = async () => {
                if (!image) return;
                setLoading(true);
                setError('');
                try {
                    const formData = new FormData();
                    formData.append('image', image);
                    const res = await fetch(`${API}/api/analyze-fridge`, { method: 'POST', body: formData });
                    const data = await res.json();
                    setSessionId(data.session_id);
                    setIngredients(data.ingredients);
                    setStep(1);
                } catch (err) {
                    setError('Failed to analyze image. Check your API key and try again.');
                }
                setLoading(false);
            };

            const addIngredient = () => {
                const trimmed = newIngredient.trim().toLowerCase();
                if (trimmed && !ingredients.includes(trimmed)) {
                    setIngredients([...ingredients, trimmed]);
                    setNewIngredient('');
                }
            };

            const removeIngredient = (item) => {
                setIngredients(ingredients.filter(i => i !== item));
                setAddedStaples(prev => { const n = new Set(prev); n.delete(item); return n; });
            };

            const toggleStaple = (staple) => {
                if (addedStaples.has(staple)) {
                    setAddedStaples(prev => { const n = new Set(prev); n.delete(staple); return n; });
                    setIngredients(ingredients.filter(i => i !== staple));
                } else {
                    setAddedStaples(prev => new Set(prev).add(staple));
                    if (!ingredients.includes(staple)) setIngredients([...ingredients, staple]);
                }
            };

            const suggestMeals = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`${API}/api/suggest-meals`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId, ingredients, specific_request: specificRequest }),
                    });
                    const data = await res.json();
                    setMeals(data.meals || []);
                    setStep(2);
                } catch (err) {
                    setError('Failed to get meal suggestions.');
                }
                setLoading(false);
            };

            const findPantries = async () => {
                if (!location.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`${API}/api/find-pantries`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId, location }),
                    });
                    const data = await res.json();
                    setPantries(data.pantries || []);
                    setSelectedPantries(new Set(data.pantries?.map((_, i) => i) || []));
                    setStep(3);
                } catch (err) {
                    setError('Failed to find pantries.');
                }
                setLoading(false);
            };

            const togglePantry = (idx) => {
                setSelectedPantries(prev => {
                    const n = new Set(prev);
                    n.has(idx) ? n.delete(idx) : n.add(idx);
                    return n;
                });
            };

            const getMissingIngredients = () => {
                if (!selectedMeal) return [];
                const meal = meals[selectedMeal];
                return meal?.missing || [];
            };

            const callPantries = async () => {
                const selected = pantries.filter((_, i) => selectedPantries.has(i));
                if (selected.length === 0) return;

                setLoading(true);
                setStep(4);
                setCallStatuses({});

                const endpoint = demoMode ? '/api/demo/call-pantries' : '/api/call-pantries';
                try {
                    await fetch(`${API}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            pantries: selected,
                            missing_ingredients: getMissingIngredients(),
                            selected_meal: selectedMeal !== null ? meals[selectedMeal]?.name : '',
                        }),
                    });
                } catch (err) {
                    setError('Failed to initiate calls.');
                }
                setLoading(false);
            };

            const getOptimalPlan = async () => {
                setLoading(true);
                const callResults = Object.entries(callStatuses)
                    .filter(([_, v]) => v.type === 'call_complete')
                    .map(([k, v]) => ({ pantry: k, ...v.results }));

                try {
                    const res = await fetch(`${API}/api/optimize-plan`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            call_results: callResults,
                            user_location: location,
                            selected_meal: selectedMeal !== null ? meals[selectedMeal]?.name : '',
                        }),
                    });
                    const data = await res.json();
                    setPlan(data);
                    setStep(5);
                } catch (err) {
                    setError('Failed to generate plan.');
                }
                setLoading(false);
            };

            const allCallsDone = Object.values(callStatuses).length > 0 &&
                Object.values(callStatuses).every(s => s.type === 'call_complete' || s.type === 'call_error');

            // ─── Render steps ─────────────────────────────────────────────
            const renderStep = () => {
                switch(step) {
                    case 0: return (
                        <div className="fade-up">
                            <h2 className="step-title">Scan your fridge</h2>
                            <p className="step-desc">Take a photo of your fridge, pantry, or whatever food you have. AI will figure out what's in there.</p>
                            <div className={`upload-zone ${imagePreview ? 'has-image' : ''}`} onClick={() => fileInputRef.current?.click()}>
                                {imagePreview ? (
                                    <img src={imagePreview} alt="Fridge" />
                                ) : (
                                    <>
                                        <div className="upload-icon">📸</div>
                                        <div className="upload-text">Tap to take a photo or upload</div>
                                        <div className="upload-hint">JPG, PNG — snap your fridge, pantry, or countertop</div>
                                    </>
                                )}
                            </div>
                            <input ref={fileInputRef} type="file" accept="image/*" capture="environment" onChange={handleImageSelect} style={{ display: 'none' }} />
                            {imagePreview && (
                                <div className="camera-buttons">
                                    <button className="cam-btn" onClick={() => { setImage(null); setImagePreview(''); }}>Retake</button>
                                </div>
                            )}
                            <button className="primary-btn" onClick={analyzeFridge} disabled={!image || loading} style={{marginTop: 20}}>
                                {loading ? <><span className="spinner"></span>Analyzing...</> : 'Analyze my food'}
                            </button>
                        </div>
                    );

                    case 1: return (
                        <div className="fade-up">
                            <h2 className="step-title">Your ingredients</h2>
                            <p className="step-desc">Here's what AI found. Add anything it missed — especially pantry staples it couldn't see.</p>
                            <div className="ingredient-list">
                                {ingredients.map((item, i) => (
                                    <div key={i} className="ingredient-chip slide-in" style={{animationDelay: `${i * 30}ms`}}>
                                        {item}
                                        <button className="remove" onClick={() => removeIngredient(item)}>×</button>
                                    </div>
                                ))}
                            </div>
                            <div className="add-ingredient-row">
                                <input className="add-input" placeholder="Add an ingredient..." value={newIngredient} onChange={e => setNewIngredient(e.target.value)} onKeyDown={e => e.key === 'Enter' && addIngredient()} />
                                <button className="add-btn" onClick={addIngredient}>Add</button>
                            </div>
                            <div className="staples-section">
                                <div className="staples-label">Quick add pantry staples</div>
                                {STAPLES.map(s => (
                                    <button key={s} className={`staple-btn ${addedStaples.has(s) ? 'added' : ''}`} onClick={() => toggleStaple(s)}>
                                        {addedStaples.has(s) ? '✓ ' : '+ '}{s}
                                    </button>
                                ))}
                            </div>
                            <div className="specific-request">
                                <label>🍕 Want something specific?</label>
                                <input className="add-input" style={{width: '100%', marginTop: 4}} placeholder='e.g., "pizza" or "something warm"' value={specificRequest} onChange={e => setSpecificRequest(e.target.value)} />
                            </div>
                            <button className="primary-btn" onClick={suggestMeals} disabled={ingredients.length === 0 || loading}>
                                {loading ? <><span className="spinner"></span>Thinking...</> : 'What can I make?'}
                            </button>
                        </div>
                    );

                    case 2: return (
                        <div className="fade-up">
                            <h2 className="step-title">Meal ideas</h2>
                            <p className="step-desc">Pick a meal — we'll find the missing ingredients at food pantries near you.</p>
                            {meals.map((meal, i) => (
                                <div key={i} className={`meal-card ${selectedMeal === i ? 'selected' : ''}`} onClick={() => setSelectedMeal(i)}>
                                    <div className="meal-name">{selectedMeal === i ? '✓ ' : ''}{meal.name}</div>
                                    <div className="meal-desc">{meal.description}</div>
                                    <div className="meal-meta">
                                        <span>⏱ {meal.time_minutes} min</span>
                                        <span>📊 {meal.difficulty}</span>
                                        <span style={{color: meal.missing?.length > 0 ? 'var(--amber-500)' : 'var(--green-600)'}}>
                                            {meal.missing?.length > 0 ? `Missing ${meal.missing.length} items` : '✓ Have everything!'}
                                        </span>
                                    </div>
                                    {selectedMeal === i && (
                                        <div className="meal-ingredients-row fade-up">
                                            <div className="meal-ing-col">
                                                <div className="meal-ing-label">✓ You have</div>
                                                {meal.have?.map((item, j) => (
                                                    <div key={j} className="meal-ing-item have">{item}</div>
                                                ))}
                                            </div>
                                            <div className="meal-ing-col">
                                                <div className="meal-ing-label">✗ Missing</div>
                                                {meal.missing?.map((item, j) => (
                                                    <div key={j} className="meal-ing-item missing">{item}</div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            <div style={{marginTop: 16}}>
                                <h3 style={{fontSize: 15, fontWeight: 700, marginBottom: 8}}>Where are you located?</h3>
                                <div className="location-input-group">
                                    <input className="add-input" placeholder="Zip code or city (e.g., Davis, CA)" value={location} onChange={e => setLocation(e.target.value)} onKeyDown={e => e.key === 'Enter' && findPantries()} />
                                </div>
                            </div>
                            <button className="primary-btn" onClick={findPantries} disabled={selectedMeal === null || !location.trim() || loading}>
                                {loading ? <><span className="spinner"></span>Finding pantries...</> : 'Find food pantries near me'}
                            </button>
                            <button className="secondary-btn" onClick={() => setStep(1)}>← Back to ingredients</button>
                        </div>
                    );

                    case 3: return (
                        <div className="fade-up">
                            <h2 className="step-title">Nearby pantries</h2>
                            <p className="step-desc">Select which pantries you'd like our AI agents to call. They'll check if your missing ingredients are available.</p>

                            <div className="demo-banner">
                                <label style={{display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer'}}>
                                    <input type="checkbox" checked={demoMode} onChange={e => setDemoMode(e.target.checked)} style={{accentColor: 'var(--amber-500)'}} />
                                    <span><strong>Demo mode</strong> — simulates calls with AI (no Twilio needed)</span>
                                </label>
                            </div>

                            <div style={{marginBottom: 12, fontSize: 13, color: 'var(--slate-500)'}}>
                                Looking for: <strong>{getMissingIngredients().join(', ')}</strong>
                            </div>

                            {pantries.map((p, i) => (
                                <div key={i} className={`pantry-card ${selectedPantries.has(i) ? 'selected' : ''}`} onClick={() => togglePantry(i)}>
                                    <div className="pantry-header">
                                        <div>
                                            <div className="pantry-name">{p.name}</div>
                                            <div className="pantry-address">{p.address}</div>
                                            <div className="pantry-phone">{p.phone}</div>
                                            {p.hours && <div style={{fontSize: 12, color: 'var(--slate-400)', marginTop: 2}}>{p.hours}</div>}
                                        </div>
                                        <div className={`pantry-check ${selectedPantries.has(i) ? 'checked' : ''}`}>
                                            {selectedPantries.has(i) ? '✓' : ''}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            <button className="primary-btn" onClick={callPantries} disabled={selectedPantries.size === 0 || loading}>
                                {loading ? <><span className="spinner"></span>Deploying agents...</> : `Call ${selectedPantries.size} pantries simultaneously`}
                            </button>
                            <button className="secondary-btn" onClick={() => setStep(2)}>← Back to meals</button>
                        </div>
                    );

                    case 4: return (
                        <div className="fade-up">
                            <h2 className="step-title">
                                <span className="live-dot"></span>
                                Calling pantries...
                            </h2>
                            <p className="step-desc">AI agents are calling pantries simultaneously. Watch results come in live.</p>
                            {Object.entries(callStatuses).map(([key, status]) => (
                                <div key={key} className="call-card slide-in">
                                    <div className="call-header">
                                        <div className="call-pantry-name">{status.pantry || key}</div>
                                        <span className={`call-status-badge badge-${status.status || status.type?.replace('call_', '')}`}>
                                            {status.status === 'ringing' ? '📞 Ringing' :
                                             status.status === 'connected' || status.status === 'listening' ? '🗣 On Call' :
                                             status.type === 'call_complete' ? '✅ Done' :
                                             status.type === 'call_error' ? '❌ Failed' : status.status}
                                        </span>
                                    </div>
                                    {status.message && <div className="call-message">{status.message}</div>}
                                    {status.results && (
                                        <div className="call-results">
                                            {status.results.available?.map((item, i) => (
                                                <div key={i} className="call-result-item result-available">✓ {item}</div>
                                            ))}
                                            {status.results.unavailable?.map((item, i) => (
                                                <div key={i} className="call-result-item result-unavailable">✗ {item}</div>
                                            ))}
                                            {status.results.substitutions && Object.entries(status.results.substitutions).map(([k, v], i) => (
                                                <div key={i} className="call-result-item" style={{color: 'var(--amber-600)'}}>↺ {k} → {v}</div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                            {allCallsDone && (
                                <button className="primary-btn fade-up" onClick={getOptimalPlan} disabled={loading}>
                                    {loading ? <><span className="spinner"></span>Optimizing...</> : 'Get my plan →'}
                                </button>
                            )}
                        </div>
                    );

                    case 5: return (
                        <div className="fade-up">
                            <h2 className="step-title">Your plan</h2>
                            {plan && (
                                <>
                                    <div className="plan-card">
                                        <div className="plan-title">🗺 Pickup route</div>
                                        {plan.plan?.map((stop, i) => (
                                            <div key={i} className="plan-stop">
                                                <div className="plan-stop-header">
                                                    <div className="plan-stop-number">{stop.visit_order || i + 1}</div>
                                                    <div className="plan-stop-name">{stop.pantry_name}</div>
                                                </div>
                                                <div className="plan-stop-items">
                                                    Pick up: {stop.items_to_get?.join(', ')}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {plan.still_missing?.length > 0 && (
                                        <div style={{padding: 16, background: 'var(--amber-50)', borderRadius: 12, marginBottom: 12, border: '1px solid var(--amber-100)'}}>
                                            <div style={{fontWeight: 700, fontSize: 14, color: 'var(--amber-600)', marginBottom: 4}}>Still missing</div>
                                            <div style={{fontSize: 13, color: 'var(--amber-600)'}}>{plan.still_missing.join(', ')}</div>
                                        </div>
                                    )}
                                    {plan.recipe_modifications && (
                                        <div style={{padding: 16, background: 'white', borderRadius: 12, border: '1.5px solid var(--slate-100)', marginBottom: 12}}>
                                            <div style={{fontWeight: 700, fontSize: 14, marginBottom: 4}}>💡 Recipe adjustments</div>
                                            <div style={{fontSize: 13, color: 'var(--slate-600)', lineHeight: 1.5}}>{plan.recipe_modifications}</div>
                                        </div>
                                    )}
                                    {plan.summary && (
                                        <div style={{padding: 16, background: 'var(--green-50)', borderRadius: 12, border: '1px solid var(--green-100)'}}>
                                            <div style={{fontSize: 14, color: 'var(--green-700)', lineHeight: 1.5}}>{plan.summary}</div>
                                        </div>
                                    )}
                                </>
                            )}
                            <button className="secondary-btn" onClick={() => { setStep(0); setImage(null); setImagePreview(''); setIngredients([]); setMeals([]); setSelectedMeal(null); setPantries([]); setPlan(null); setCallStatuses({}); }}>
                                Start over
                            </button>
                        </div>
                    );
                }
            };

            return (
                <div className="app-container">
                    <div className="header">
                        <div className="header-logo">
                            <span>🥫</span> PantryPal
                        </div>
                        <div className="header-sub">AI-powered food pantry coordinator</div>
                    </div>
                    <div className="steps-bar">
                        {[...Array(TOTAL_STEPS)].map((_, i) => (
                            <div key={i} className={`step-dot ${i === step ? 'active' : i < step ? 'done' : ''}`} />
                        ))}
                    </div>
                    <div className="content">
                        {error && (
                            <div style={{padding: 12, background: 'var(--red-100)', borderRadius: 10, marginBottom: 16, fontSize: 13, color: 'var(--red-500)'}}>
                                {error}
                                <button onClick={() => setError('')} style={{float: 'right', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--red-400)'}}>×</button>
                            </div>
                        )}
                        {renderStep()}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
